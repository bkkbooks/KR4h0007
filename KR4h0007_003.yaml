body:
  text: 髙氏三宴詩集巻下唐髙正臣輯上元夜宴效小庾體并序長孫正隠九谷帝畿三川奥域交風均露上分朱鳥之躔泝洛背河下鎖蒼龍之闕多近臣之第宅即瞰銅街有貴戚之樓臺自連金苑美人競出錦帳如霞公子交馳雕鞍似月同㳺洛浦疑尋稅馬之津争渡河橋似向牽牛之渚實昌年之樂事令節之佳逰者焉凡六人同用春字為韻髙正臣詩闕崔知賢今夜啟城闉結伴戯芳春鼔聲撩亂動風光觸處新月下多逰騎燈前饒㸔人觀樂無窮已歌舞達明晨韓重宣他鄉月下人相伴㸔燈輪光隨九華出影共百枝新歌鐘盛北里車馬沸南隣今宵何處好惟有洛城春髙瑾初年三五夜相知一兩人連鑣出巷口飛轂下池濱燈光恰似月人面併如春遨逰終未已相歡待日輪長孫正隠薄晩嘯逰人車馬亂驅塵月光三五夜燈熖一重春烟雲迷北闕簫管識南隣洛城終不閉更出小平津陳嘉言今夜可憐春河橋多麗人寳馬金為絡香車玉作輪連手窺潘掾分頭㸔洛神重城自不掩出向小平津髙氏三宴詩巻下
