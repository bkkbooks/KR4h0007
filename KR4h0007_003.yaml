body:
  text: 髙氏三宴詩集卷下唐髙正臣輯上元夜宴效小庾體并序長孫正隱九谷帝畿三川奧域交風均露上分朱鳥之躔泝洛背河下鎖蒼龍之闕多近臣之第宅即瞰銅街有貴戚之樓臺自連金苑美人競出錦帳如霞公子交馳雕鞍似月同遊洛浦疑尋稅馬之津爭渡河橋似向牽牛之渚實昌年之樂事令節之佳逰者焉凡六人同用春字為韻髙正臣詩闕崔知賢今夜啓城闉結伴戲芳春鼓聲撩亂動風光觸處新月下多逰騎燈前饒看人觀樂無窮已歌舞達明晨韓重宣他鄉月下人相伴看燈輪光隨九華出影共百枝新歌鐘盛北里車馬沸南鄰今宵何處好惟有洛城春髙瑾初年三五夜相知一兩人連鑣出巷口飛轂下池濱燈光恰似月人面併如春遨逰終未已相歡待日輪長孫正隱薄晚嘯逰人車馬亂驅塵月光三五夜燈熖一重春煙雲迷北闕簫管識南鄰洛城終不閉更出小平津陳嘉言今夜可憐春河橋多麗人寶馬金為絡香車玉作輪連手窺潘掾分頭看洛神重城自不掩出向小平津髙氏三宴詩卷下
