body:
  text: 髙氏三宴詩集卷中唐髙正臣輯晦日重宴并序周彥暉序云云缺凡八人同用池字為韻髙正臣芳晨重遊衍乘景共追隨班荆陪舊識傾蓋得新知水葉分蓮沼風花落栁枝自符河朔趣寧羡山陽池韓重宣鳳苑仙吹晚龍樓夕照披陳遵已投轄山公正坐池落日催金奏飛霞送玉巵此時陪綺席不醉欲何為弓嗣初年華藹芳隰春溜滿新池促賞依三友延歡寄一巵鳥聲隨管變栁影逐風移行樂方無極淹留惜晚曦髙瑾忽聞鶯響谷於此命相知正開彭澤酒來向髙陽池栁葉風前弱梅花影處危賞洽林亭晚落照下參差陳嘉言髙門臨冠蓋下客抱支離綺席珍羞滿文場藻翰摛蓂花雕上葉栁色靄春池日斜歸戚里連騎勒金羈周彥暉春華歸栁岸晦景落􅕴枝置驛銅街右開筵玉浦陲煙林含帳密竹雨帶珠危興闌巾倒戴山公下習池髙嶠駕言尋鳳侣乘歡俯雁池班荆逢舊識斟桂喜深知紫蘭方出徑黃鶯未囀枝别有陶春日青天雲霧披周思鈞綺筵乘晦景髙宴下陽池濯雨梅香散含風栁色移輕塵依扇落流水如弦危勿顧林亭晚方歡雲霧披髙氏三宴詩集卷中
  hash: sha256:1d03b5086d288fe1fb50a13fecf94d628aef16a551fae81e63917d7744139dfd
