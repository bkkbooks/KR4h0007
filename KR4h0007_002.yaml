body:
  text: 髙氏三宴詩集巻中唐髙正臣輯晦日重宴并序周彦暉序云云缺凡八人同用池字為韻髙正臣芳晨重㳺衍乗景共追隨班荆陪舊識傾蓋得新知水葉分蓮沼風花落栁枝自符河朔趣寧羡山陽池韓重宣鳳苑仙吹晩龍樓夕照披陳遵已投轄山公正坐池落日催金奏飛霞送玉巵此時陪綺席不醉欲何為弓嗣初年華藹芳隰春溜滿新池促賞依三友延歡寄一巵鳥聲隨管變栁影逐風移行樂方無極淹留惜晩曦髙瑾忽聞鶯響谷於此命相知正開彭澤酒來向髙陽池栁葉風前弱梅花影處危賞洽林亭晩落照下参差陳嘉言髙門臨冠蓋下客抱支離綺席珍羞滿文塲藻翰摛蓂花彫上葉栁色靄春池日斜歸戚里連騎勒金覊周彦暉春華歸栁岸晦景落􅕴枝置驛銅街右開筵玉浦陲烟林含帳宻竹雨帯珠危興闌巾倒戴山公下習池髙嶠駕言尋鳳侣乗歡俯雁池班荆逢舊識斟桂喜深知紫蘭方出徑黄鶯未囀枝别有陶春日青天雲霧披周思鈞綺筵乗晦景髙宴下陽池濯雨梅香散含風栁色移輕塵依扇落流水如弦危勿顧林亭晩方歡雲霧披髙氏三宴詩集巻中
