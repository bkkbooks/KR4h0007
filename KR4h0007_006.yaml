front:
  text: 香山九老詩爵里紀年胡杲安定人前懷州司馬年八十九吉皎馮翊人衛尉卿致仕年八十八劉貞廣平人前磁州刺史年八十七鄭豦榮陽人前龍武衛長史年八十五盧貞范陽人前侍御史內供奉官年八十三張渾清和人前永州刺史年七十七白居易太原人刑部尚書致仕年七十四李元爽洛中遺老年一百三十六禪僧如滿年九十五
  hash: sha256:363b9b7f3583abb1f74e513aacf71aa894188992af6b3858e0b132b081b81ead
