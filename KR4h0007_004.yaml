body:
  text: 高氏三宴詩集詩後高正臣廣平人連姻帝室官至衛尉卿寓居洛陽善詠愛客一時名士多所交接習右軍書法睿宗愛其筆金陵棲霞寺有其所書碑攝山棲霞寺明徵君之碑南齊徵君明僧紹平原人周思鈞貝州漳南人與兄思茂俱早知名武后時為太子文學劉禕之被收臨刑洗沐神色自若援筆為表詞理􅈤至思鈞稱嘆其文武后惡之貶揚州司倉參軍以中書舍人終
