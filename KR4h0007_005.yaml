body:
  text: 香山九老詩序㑹昌五年三月二十四日胡吉劉鄭盧張等六人皆多年夀余亦次焉於東都敝居履道坊內合尚齒之㑹七老相顧既醉且歡靜而思之此㑹希有因各賦七言六韻詩一章以記之或傳諸好事者其年夏又有二老年貌絶倫同歸故鄉亦來斯㑹續命書姓氏年齒寫其形貌于圖右與前七老題為九老圖仍以一絶贈之云雪作須眉雲作衣遼東華表暮雙歸當時一鶴猶希有何況今逢兩令威二老乃洛中遺老李元爽年一百三十六禪僧如滿歸洛年九十五時祕書狄兼謨河南尹盧貞以老未七十雖與㑹而不及列
