body:
  text: 香山九老詩胡杲閒居同㑹在三春大抵愚年是出羣霜鬢不嫌杯酒興白頭仍愛玉罏薫徘徊玩柳心猶徤老大看花意却勤鑿落滿斟判酩酊香囊高掛甚氤氲搜神得句題紅紙望景長吟對白雲今日交情何不替齊年同侍聖明君吉皎休官罷任已閒居林苑園亭興有餘對酒最宜花藻發邀歡不厭柳條初低腰醉舞垂緋袖擊筯謳歌任褐裙寧用管絃來合雜自親松竹且清虚飛觥酒到須先酌賦咏詩成不住書借問商山賢四皓不知此後更何如劉貞垂絲今日幸同筵朱紫居身似大年賞景尚知心未退吟詩猶覺力完全閒庭飲酒當三月在席揮毫象七賢山茗煑時秋露碧玉杯斟處綵霞鮮臨堦花笑如歌妓傍竹松聲當管絃雖未學窮生死訣人間豈不是神仙鄭豦東洛幽閒日莫春邀歡皆是白頭賔官班朱紫多相似年紀高低次第匀聨句每言松竹意停杯多説古今人更無外事來心肺空有清虚入思神醉舞兩回迎歡酒狂歌一曲㑹娯身今朝何事偏情重同作明時列任臣盧貞三春已盡洛陽宫天氣初晴景象中千朶嫩桃迎曉日萬株隨柳逐和風非論官位皆相似及至年高亦共同對酒歌聲猶覺妙玩花詩思豈能窮先時共作三朝貴今日相逢七老翁但願緑􅌬長滿酌烟霞萬里㑹應通張渾幽亭春盡共為歡印綬居身是大官遁跡豈勞登逺岫垂絲何必坐溪磻詩聨六韻應猶易酒飲三杯未覺難每況襟懷同宴㑹共將心事比波瀾風吹野柳垂羅帶日照庭花落綺紈此席不煩鋪錦帳斯筵堪作畫圖看白居易七人五百八十四拖紫紆朱垂白鬚囊裏無金莫嗟嘆罇中有酒且歡娯吟成六韻神還壯飲到三杯氣尚麄嵬峨狂歌教婢拍婆娑醉舞遣孫扶天年高邁二疏傅人數多于四皓圖除却三山五天竺人間此㑹且應無附狄兼謨得老加年誠可喜當春對酒亦宜歡心中别有歡喜事開得龍門八節灘盧貞眼暗頭旋耳重聴唯餘心口尚醒醒今朝歡喜縁何事禮徹佛名百部經香山九老詩
