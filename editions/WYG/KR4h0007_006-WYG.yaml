front:
  text: 香山九老詩爵里紀年胡杲安定人前懷州司馬年八十九吉皎馮翊人衛尉卿致仕年八十八劉貞廣平人前磁州刺史年八十七鄭豦榮陽人前龍武衛長史年八十五盧貞范陽人前侍御史内供奉官年八十三張渾清和人前永州刺史年七十七白居易太原人刑部尚書致仕年七十四李元爽洛中遺老年一百三十六禪僧如滿年九十五
  hash: sha256:757fd5c6c76d963e10d1f19d2017702d8bbc3ef1dd9ea464371a9117326c16a8
