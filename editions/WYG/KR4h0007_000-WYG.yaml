body:
  text: 髙氏三宴詩集總集類提要臣等謹案髙氏三宴詩集三巻附香山九老詩一巻唐髙正臣輯所載皆同人會宴之詩以誌一時之盛詩分三巻巻各有序一為陳子昻一為周彦暉一為長孫正隠三宴皆于髙氏與宴者凡二十一人考之新唐書有列傳者三人則陳子昻郎餘令解琬也附見他傳者一人則周思鈞也見于本紀及世系表一人則張錫也僅見于世系表者五人則髙正臣髙瑾王茂時髙紹髙嶠也餘皆不詳顛末按世系表正臣曾為襄州刺史不云衞尉卿今詩後叙正臣及周思鈞事獨詳所云連姻帝室寓居洛陽皆與諸序語合似非無據然必係後人所加矣末又附香山九老㑹詩一巻巻尾有夷白堂重雕字樣考宋鮑慎田欽止元祐六年進士著有夷白堂集所刋書籍甚夥葢髙氏三宴與香山九老俱係唐人又俱在洛陽故並為之開雕宋人珍重古書往往如此九老會詩已附見白香山詩集而三宴詩之名目史志缺如則此誠秘本矣第當時就宋本傳抄其中不無訛處如以髙嶠為司府郎中唐百官志無司府郎中之名應從世系表改為司門郎中又張錫于武后久視元年拜同平章事貝州東武城人詩中誤以錫東為名殊屬錯謬又弓嗣初髙瑾周彦暉並曰咸寧進士唐無咸寧年號髙宗曾改元咸亨寧字定係亨字之誤兹並為改正云乾隆四十六年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:861e3d181f29dbffcce00e67927488b0a349d3044d54479f7fdbf3d27448aa50
