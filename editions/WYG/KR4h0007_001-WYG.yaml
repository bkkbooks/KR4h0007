body:
  text: 髙氏三宴詩集巻上唐髙正臣輯晦日置酒林亭并序陳子昻有渤海之宗英是平陽之貴戚發揮鳳管而嘯侣幽贊雞川而留宴冠纓濟濟多延戚里之賓鸞鳳鏘鏘自有文雅之客凡二十有一人皆以華字為韻髙正臣廣平人衞尉卿正月符佳節三春玩物華忘懐寄罇酒陶性狎山家栁翠含烟葉梅芳帯雪花光隂不相借遲遲落景斜崔知賢闕上月河陽地芳辰景望華綿蠻變時鳥照耀起春霞栁摇風處色梅散日前花淹留洛城晩歌吹石崇家韓重宣闕欲知行有樂芳罇對物華地接安仁縣園是季倫家栁暗雲疑葉梅開雪似花日落歸途逺留興伴烟霞周彦昭闕勝地臨雞浦髙㑹偶龍沙御栁驚春色仙笻揜月華門邀千里馭杯泛九光霞日落山亭晩雷送七香車髙球闕温洛年光早皇州景望華連鑣尋上路乗興入山家輕苔網危石春水架平沙賞極林塘莫處處起烟霞弓嗣初咸亨二年進士一人上序春暉麗中園候物華髙才盛文雅逸興滿烟霞参差金谷樹皎鏡碧塘沙簫鼔林亭晩倒載欲還家髙瑾渤海人咸亨元年進士試入山亭望言是石崇家二月風光起三春桃李華鶯吟上喬木㕍往息平沙相㸔㑹取醉寧知還路賖王茂時闕勝踐尋良㑹乗春玩物華還随張放友來向石崇家止水分巖鏡開庭枕浦沙未極清泉賞参差落照斜徐皓闕綺筵乗暇景瓊醑對年華門多金埓騎路引璧人車蘋早猶藏葉梅殘正落花靄靄林亭晩餘興促流霞長孫正隠闕晦晩屬烟霞遨逰重嵗華歌鐘雖戚里林藪是山家細雨猶開日深池不漲沙淹留迷處所岩岫幾重花髙紹考功郎中嘯侣入仙家臨春玩物華葛絲調緑水桂醑酌丹霞岸栁開新葉亭梅落早花興洽林亭晩方還倒載車郎餘令定州人進士著作郎三春休晦節九谷泛年華半晴餘細雨全晩澹殘霞罇開疎竹葉管應落梅花興闌相顧起流水送香車陳嘉言闕公子申敬愛携朋玩物華人是平陽客地即石崇家水紋生舊圃風色滿新花日暮連歸騎長川照落霞周彦暉咸亨五年進士砌􅕴收晦魄津栁競年華既狎忘筌友方淹投轄車綺筵囬舞雪瓊醑泛流霞雲低天上晩絲竹帯風斜髙嶠司門郎中飛歡寫春望開宴坐汀沙積水含苔色晴空蕩日華歌入平陽地舞對石崇家莫慮能騎馬投轄自停車周思鈞貝州漳南人中書舎人早春驚栁穟初晦揜􅕴華騎出平陽里筵開衞尉家竹影含雲宻池紋帯雨斜重惜林亭晩上路滿烟霞劉友賢闕春來日漸賖琴酒逐年華欲向文通徑先㳺武子家池碧新泉滿巖紅落照斜興闌情未極歩歩惜風花陳子昻字伯玉射洪人進士右拾遺尋春逰上路追宴入山家主第簪纓滿皇州景物華玉池初吐溜珠樹始開花歡娛方未極林閣散餘霞張錫東武城人宰相封平原公雪盡銅駝路花照石崇家年光開栁色池影泛雲華賞洽情方逺春歸景未賖欲知多暇日罇酒漬澄霞王勔綘州龍門人澤州長史上序披林舘中京視物華竹忩低露葉梅徑起風花景落春臺霧池浸舊渚沙綺筵歌吹晩莫雨泛香車解琬元城人太子賓客主第簪裾出王畿春望華山亭一以眺城闕帯烟霞横堤列錦帳傍浦駐香車歡娛屬晦節酩酊未還家髙氏三宴詩集巻上
